name: e2e-nightly-full

# V5.50.6 — frontend E2E nightly full 闸门。
# 3 browser × 23 真 spec,cron 06:30 UTC(跟 perf-bench 03:00 错开 3.5h)。
# 失败 **不**挡 PR merge,只 nightly 看。

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-nightly-full
  cancel-in-progress: false

jobs:
  full:
    runs-on: [self-hosted, linux, x64, sit-336]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: console-ui/package-lock.json

      - name: Install deps
        working-directory: console-ui
        run: npm ci

      - name: Install Playwright (chromium + firefox + webkit)
        working-directory: console-ui
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Start backend stack
        run: |
          docker compose up -d mysql console-app executor-app
          echo "等待 console-app 健康..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8180/ruleforge/ >/dev/null 2>&1; then
              echo "Backend ready after ${i} attempts"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8180/ruleforge/ >/dev/null 2>&1 \
            || (echo "Backend not ready, aborting"; exit 1)

      - name: Run full E2E (3 browser × 23 spec)
        working-directory: console-ui
        env:
          PLAYWRIGHT_BASE_URL: http://localhost
        run: npx playwright test --reporter=line

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-${{ github.run_number }}
          path: console-ui/playwright-report/
          retention-days: 14
