name: e2e-tour-nightly

# V5.50.7 — frontend E2E tour nightly 闸门。
# 13 tour spec(以 _ 开头 -tour 后缀,跟 23 真 spec 物理分离),
# cron 07:00 UTC(跟 e2e-nightly-full 06:30 错开 30min)。
# 失败 **不**挡 PR merge,只 nightly 看。

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-tour-nightly
  cancel-in-progress: false

jobs:
  tour:
    runs-on: [self-hosted, linux, x64, sit-336]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: console-ui/package-lock.json

      - name: Install deps
        working-directory: console-ui
        run: npm ci

      - name: Install Playwright chromium
        working-directory: console-ui
        run: npx playwright install --with-deps chromium

      - name: Start backend stack
        run: |
          docker compose up -d mysql console-app executor-app
          echo "等待 console-app 健康..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8180/ruleforge/ >/dev/null 2>&1; then
              echo "Backend ready after ${i} attempts"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8180/ruleforge/ >/dev/null 2>&1 \
            || (echo "Backend not ready, aborting"; exit 1)

      - name: Run tour E2E (13 spec, chromium only)
        working-directory: console-ui
        env:
          PLAYWRIGHT_BASE_URL: http://localhost
        run: npx playwright test --config=playwright.config.tour.js --reporter=line

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-tour-${{ github.run_number }}
          path: console-ui/playwright-report/
          retention-days: 14
