<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RuleForge</title>

    <script type="text/javascript" src="./lib/jquery.min.js"></script>
    <script type="text/javascript" src="./lib/bootstrap.min.js"></script>
    <script type="text/javascript" src="./lib/bootbox.min.js"></script>
    <script type="text/javascript" src="./lib/bootstrapValidator.min.js"></script>
</head>
<body>
<div id='container'></div>
<script type="text/javascript">
    window._server = "./api";
    window._welcomePage = "";
    // Auth check
    (function() {
        var xhr = new XMLHttpRequest();
        xhr.open('POST', './api/frame/currentUser', false);
        xhr.send();
        try {
            var result = JSON.parse(xhr.responseText);
            if (!result.status) {
                window.location.href = 'html/login.html?redirect=' + encodeURIComponent(window.location.pathname);
            } else {
                window.__currentUser = result.user;
            }
        } catch(e) {
            window.location.href = 'html/login.html?redirect=' + encodeURIComponent(window.location.pathname);
        }
    })();
</script>
</body>
</html>
