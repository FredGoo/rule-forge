name: Build and Deploy Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (optional, default: timestamp)'
        required: false
        type: string
      build_only:
        description: 'Build image only (without deployment)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64, sit-336]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi
          echo "commit_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."

          docker build \
            --build-arg BUILD_VERSION=${{ steps.version.outputs.tag }} \
            --build-arg BUILD_COMMIT=${{ steps.version.outputs.commit_sha }} \
            --build-arg BUILD_DATE=${{ steps.version.outputs.build_date }} \
            -t ruleforge-console-ui:${{ steps.version.outputs.tag }} \
            -t ruleforge-console-ui:latest \
            -t ruleforge-console-ui:sit-latest \
            .

          echo "✅ Docker image built successfully!"

      - name: Stop and remove old container
        if: github.event.inputs.build_only != 'true'
        run: |
          echo "🛑 Stopping old container..."

          if docker ps -a | grep -q ruleforge-console; then
            docker-compose down || true
            echo "✅ Old container stopped and removed"
          else
            echo "ℹ️  No existing container found"
          fi

      - name: Start new container
        if: github.event.inputs.build_only != 'true'
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          echo "🚀 Starting new container..."

          docker-compose up -d

          echo "⏳ Waiting for container to be healthy..."
          sleep 5

          # Check container status
          if docker ps | grep -q ruleforge-console; then
            echo "✅ Container is running!"

            # Wait for health check
            for i in {1..30}; do
              if docker inspect --format='{{.State.Health.Status}}' ruleforge-console 2>/dev/null | grep -q healthy; then
                echo "✅ Container is healthy!"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "⚠️  Health check timeout, but container is running"
              fi
              sleep 1
            done
          else
            echo "❌ Container failed to start!"
            docker logs ruleforge-console
            exit 1
          fi

      - name: Clean up old images
        run: |
          echo "🧹 Cleaning up old images..."

          # Keep last 5 images, remove older ones
          docker images ruleforge-console --format "{{.ID}} {{.Tag}}" | \
            grep -v latest | \
            tail -n +6 | \
            awk '{print $1}' | \
            xargs -r docker rmi || true

          echo "✅ Cleanup complete"

      - name: Display build info (build only)
        if: github.event.inputs.build_only == 'true'
        run: |
          echo "========================================="
          echo "✅ Build Complete!"
          echo "========================================="
          echo "Version:     ${{ steps.version.outputs.tag }}"
          echo "Commit:      ${{ steps.version.outputs.commit_sha }}"
          echo "Build Date:  ${{ steps.version.outputs.build_date }}"
          echo "Image:       ruleforge-console-ui:${{ steps.version.outputs.tag }}"
          echo "Image:       ruleforge-console-ui:latest"
          echo "Image:       ruleforge-console-ui:sit-latest"
          echo "========================================="
          echo ""
          echo "📦 Image built successfully but NOT deployed."
          echo "To deploy manually, run:"
          echo "  docker-compose up -d"

      - name: Display deployment info
        if: github.event.inputs.build_only != 'true'
        run: |
          echo "========================================="
          echo "✅ Deployment Complete!"
          echo "========================================="
          echo "Version:     ${{ steps.version.outputs.tag }}"
          echo "Commit:      ${{ steps.version.outputs.commit_sha }}"
          echo "Build Date:  ${{ steps.version.outputs.build_date }}"
          echo "Container:   ruleforge-console-ui"
          echo "Port:        \${CONSOLE_PORT:-8080} → 80"
          echo "========================================="

          # Show container info
          docker ps --filter name=ruleforge-console-ui --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Build Summary (build only)
        if: github.event.inputs.build_only == 'true'
        run: |
          echo "### 📦 Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ steps.version.outputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date**: ${{ steps.version.outputs.build_date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tags**: ruleforge-console-ui:${{ steps.version.outputs.tag }}, ruleforge-console-ui:latest, ruleforge-console-ui:sit-latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Built by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ **Image built but NOT deployed**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Manual Deployment" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker-compose up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Deployment Summary
        if: github.event.inputs.build_only != 'true'
        run: |
          echo "### 🎉 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ steps.version.outputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date**: ${{ steps.version.outputs.build_date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Container**: ruleforge-console-ui" >> $GITHUB_STEP_SUMMARY
          echo "- **Port**: \${CONSOLE_PORT:-8080} → 80" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Access" >> $GITHUB_STEP_SUMMARY
          echo "- Web: http://localhost:\${CONSOLE_PORT:-8080}" >> $GITHUB_STEP_SUMMARY
          echo "- Health: http://localhost:\${CONSOLE_PORT:-8080}/health" >> $GITHUB_STEP_SUMMARY
          echo "- Version: http://localhost:\${CONSOLE_PORT:-8080}/VERSION.txt" >> $GITHUB_STEP_SUMMARY
